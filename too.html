



<!DOCTYPE html>
<html>
<head>
  <title>Resume AI Parser Test</title>
  <meta charset="UTF-8" />

  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 8px;
    }

    button {
      padding: 10px 18px;
      cursor: pointer;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
  </style>
</head>
<body>

<h2>🚀 Resume → AI → Auto Fill (n8n Test)</h2>

<!-- Resume text (simulate extracted text) -->
<h3>Resume Text (pretend this came from PDF)</h3>

<textarea id="resumeText" rows="10">
John Doe
Software Developer
Email: john@gmail.com
Phone: 9999999999
Location: Kochi

Skills: React, Node.js, SQL, MongoDB
Experience: 3 years
Education: B.Tech Computer Science
Languages: English, Hindi
</textarea>

<button onclick="sendToAI()">Parse with AI</button>

<hr />

<h3>Candidate Profile (Auto-filled)</h3>

<div class="row">
  <input id="firstName" placeholder="First Name" />
  <input id="lastName" placeholder="Last Name" />
</div>

<div class="row">
  <input id="email" placeholder="Email" />
  <input id="phone" placeholder="Phone" />
</div>

<input id="location" placeholder="Location" />
<input id="experience" placeholder="Experience" />
<input id="education" placeholder="Education" />
<input id="skills" placeholder="Skills (comma separated)" />

<script>
    import cors from "cors"

app.use(cors({
  origin: ["http://127.0.0.1:5500", "http://localhost:5500"],
  methods: ["GET", "POST", "OPTIONS"],
  credentials: true
}))
async function sendToAI() {
  const resumeText = document.getElementById("resumeText").value;

  const res = await fetch("http://localhost:5678/webhook/parse-resume", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ resumeText })
  });

  const data = await res.json();

  // Auto fill fields
  document.getElementById("firstName").value = data.firstName || "";
  document.getElementById("lastName").value = data.lastName || "";
  document.getElementById("email").value = data.email || "";
  document.getElementById("phone").value = data.phone || "";
  document.getElementById("location").value = data.currentLocation || "";
  document.getElementById("experience").value = data.totalExperience || "";
  document.getElementById("education").value = data.highestEducation || "";
  document.getElementById("skills").value = (data.skills || []).join(", ");

  alert("✅ AI parsing completed!");
}
</script>

</body>
</html>
